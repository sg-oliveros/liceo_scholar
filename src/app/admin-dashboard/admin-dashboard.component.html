<div class="dashboard-container">

  <main class="main-content">

      <section class="card activity-chart">
        <h3>User's Activity</h3>
        <div class="chart-wrapper">
          <canvas #activityChart></canvas>
        </div>
      </section>

      <aside class="side-info">
        <div class="profile-card">
          <p class="profile-label">PROFILE</p>
          <div class="avatar"></div>
          <p class="name">Alvarez, James Jason, R. PHD.</p>
        </div>
        <div class="status-cards">
          <div class="status-box"><span>Active</span><h2>6</h2></div>
          <div class="status-box"><span>Not Active</span><h2>7</h2></div>
        </div>
      </aside>
    </div>

    <section class="card table-card">
      <div class="table-header">
        <div class="search-bar">🔍 <input type="text" placeholder="Search"></div>
      </div>
      <table class="student-table">
        <thead>
          <tr>
            <th>Last Name, First Name, MI.</th>
            <th>Course & Yr Level</th>
            <th>Scholarship Type</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><span class="status-dot online"></span> Oliveros, Samantha Gayle R.</td>
            <td>CISCO BSIT 2-1</td>
            <td>Academic Scholarship</td>
            <td class="status-text">Complete</td>
          </tr>
        </tbody>
      </table>
      <div class="see-more">See More</div>
    </section>
  </main>
</div>
