<div class="container">
  <app-user-sidebar></app-user-sidebar>

  <div class="content">

    <div class="profile-section">
      <div class="info">
        <label>Last Name, First Name, MI.</label>
        <input [value]="student.fullName" disabled />

        <label>Course</label>
        <input [value]="student.course" disabled />

        <label>Year Level</label>
        <input [value]="student.yearLevel" disabled />

        <label>Age</label>
        <input [value]="student.age" disabled />

        <label>Sex</label>
        <input [value]="student.sex" disabled />

        <label>Scholarship Type</label>
        <input [value]="student.scholarshipType" disabled />
      </div>

      <div class="profile-img-wrapper">
        <img [src]="student.profileImage" alt="Profile" class="profile-img" />
        <button class="edit-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="apply-row">
      <button class="apply-btn">Apply</button>
    </div>

    <div class="history-table">
      <div class="table-head">
        <span>Application History</span>
        <span>Status</span>
      </div>
      <div class="table-row" *ngFor="let record of student.history">
        <span>{{ record.term }}</span>
        <span [ngClass]="record.status.toLowerCase()">{{ record.status }}</span>
      </div>
    </div>

  </div>
</div>
